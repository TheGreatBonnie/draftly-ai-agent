name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Type check with mypy
        run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      cockroachdb:
        image: cockroachdb/cockroach:latest
        ports:
          - 26258:26258
        options: >-
          --health-cmd "cockroach sql --insecure --host=localhost:26258 -e 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        env:
          COCKROACHDB_URL: postgresql://root@cockroachdb:26258/defaultdb?sslmode=disable

    env:
      COCKROACHDB_URL: postgresql://root@localhost:26258/defaultdb?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Initialize database
        run: uv run python scripts/init_db.py

      - name: Run tests
        run: uv run pytest tests/ -v
